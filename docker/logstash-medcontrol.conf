input {
  tcp {
    port => 5000
    codec => json_lines
    type => "medcontrol-app"
  }
}

filter {
  if [type] == "medcontrol-app" {
    mutate {
      add_field => { "application" => "medcontrol" }
      add_field => { "environment" => "dev" }
    }
  }
}

output {
  loki {
    url => "http://loki:3100/loki/api/v1/push"
    batch_size => 100
  }

  stdout { codec => rubydebug }
}