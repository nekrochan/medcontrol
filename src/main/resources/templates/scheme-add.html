<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новая схема | MedControl</title>
    <link th:href="@{/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/bootstrap-icons.css}" rel="stylesheet">
    <link th:href="@{/style.css}" rel="stylesheet">
</head>
<body>

<div th:replace="fragments/navbar :: body"></div>

<main class="main-content">
    <div class="page-header">
        <p class="breadcrumb-text mb-1">
            <a th:href="@{/schemes/all}"><i class="bi bi-arrow-left me-1"></i>Схемы приема</a>
        </p>
        <h1>Создание новой схемы</h1>
    </div>

    <div class="form-card">
        <form th:action="@{/schemes/add}"
              th:object="${schemeModel}"
              method="post"
              id="schemeForm"
              novalidate>

            <div class="mb-group">
                <label for="name" class="form-label">Название схемы</label>
                <input type="text"
                       id="name"
                       th:field="*{name}"
                       class="form-control"
                       th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                       required
                       placeholder="Например: Перед завтраком">
                <span th:if="${#fields.hasErrors('name')}"
                      th:errors="*{name}"
                      class="error-msg">Ошибка</span>
            </div>

            <div class="mb-group">
                <label for="medicationName" class="form-label">Название препарата</label>
                <input type="text"
                       id="medicationName"
                       th:field="*{medicationName}"
                       class="form-control"
                       th:classappend="${#fields.hasErrors('medicationName')} ? 'is-invalid'"
                       required
                       placeholder="Например: Витамин D₃">
                <span th:if="${#fields.hasErrors('medicationName')}"
                      th:errors="*{medicationName}"
                      class="error-msg">Ошибка</span>
            </div>

            <div class="row-fields">
                <div class="mb-group">
                    <label for="dosage" class="form-label">Дозировка</label>
                    <input type="number"
                           step="0.01"
                           id="dosage"
                           th:field="*{dosage}"
                           class="form-control"
                           th:classappend="${#fields.hasErrors('dosage')} ? 'is-invalid'"
                           placeholder="1.5">
                    <span th:if="${#fields.hasErrors('dosage')}"
                          th:errors="*{dosage}"
                          class="error-msg">Ошибка</span>
                </div>

                <div class="mb-group">
                    <label for="measure" class="form-label">Единица измерения</label>
                    <input type="text"
                           id="measure"
                           th:field="*{measure}"
                           class="form-control"
                           th:classappend="${#fields.hasErrors('measure')} ? 'is-invalid'"
                           placeholder="таб.">
                    <span th:if="${#fields.hasErrors('measure')}"
                          th:errors="*{measure}"
                          class="error-msg">Ошибка</span>
                </div>
            </div>

            <input type="hidden" th:field="*{profileId}">

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check2-circle me-1"></i> Создать и продолжить настройку
                </button>
                <a th:href="@{/schemes/all}" class="btn btn-outline-secondary">
                    Отмена
                </a>
            </div>
        </form>
    </div>
</main>

<script th:src="@{/bootstrap.bundle.min.js}"></script>
<script th:src="@{/scheme-script.js}"></script>
</body>
</html>
