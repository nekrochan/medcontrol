<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приемы на день | MedControl</title>
    <link th:href="@{/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/bootstrap-icons.css}" rel="stylesheet">
    <link th:href="@{/style.css}" rel="stylesheet">
</head>
<body>

<div th:with="currentPage='day'">
    <div th:replace="~{fragments/navbar :: body}"></div>
</div>

<main class="main-content main-content-xwide">
    <div class="section-block">
        <div class="section-header">
            <h2>
                <i class="bi bi-calendar-check me-2" style="color: #6366f1;"></i>
                Приемы на <span th:text="${#temporals.format(date, 'dd MMMM yyyy')}">Дата</span>
            </h2>

            <div class="date-nav">
                <a th:href="@{'/intakes/date/' + ${date.minusDays(1)}}" class="btn-date">
                    <i class="bi bi-chevron-left me-1"></i> Вчера
                </a>
                <a th:href="@{/intakes}"
                   th:class="${#temporals.format(date, 'yyyy-MM-dd') == #temporals.format(#temporals.createNow(), 'yyyy-MM-dd')} ? 'btn-date active-date' : 'btn-date'">
                    Сегодня
                </a>
                <a th:href="@{'/intakes/date/' + ${date.plusDays(1)}}" class="btn-date">
                    Завтра <i class="bi bi-chevron-right ms-1"></i>
                </a>
                <button type="button" class="btn-date" id="calendarBtn">
                    <i class="bi bi-calendar3"></i> Календарь
                </button>
            </div>
        </div>

        <div th:if="${success}" class="message-success">
            <i class="bi bi-check-circle-fill"></i>
            <span th:text="${success}"></span>
        </div>
        <div th:if="${error}" class="message-error">
            <i class="bi bi-exclamation-circle-fill"></i>
            <span th:text="${error}"></span>
        </div>
    </div>

    <div class="modal fade" id="calendarModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered" style="max-width: 350px;">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-calendar3 me-2"></i>Выберите дату</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
                </div>
                <div class="modal-body" style="padding: 10px;">
                    <input type="date" id="calendarDatePicker" class="form-control"
                           th:value="${#temporals.format(date, 'yyyy-MM-dd')}"
                           style="font-size: 1rem; padding: 12px;">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                    <button type="button" class="btn btn-primary" id="calendarGoBtn">Перейти</button>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${not #lists.isEmpty(nearestIntakeIds)} and
    ${#temporals.format(date, 'yyyy-MM-dd') == #temporals.format(#temporals.createNow(),
    'yyyy-MM-dd')}" class="section-block">
        <div class="section-header">
            <h3><i class="bi bi-star-fill me-2" style="color: #f59e0b; font-size: 0.9rem;"></i> Ближайшие приемы</h3>

            <div class="batch-chips">
                <form th:action="@{/intakes/user/{profileId}/batch-status(profileId=${profileId})}"
                      method="post" class="status-form batch-status-form">
                    <input type="hidden" name="status" value="TAKEN">
                    <button type="submit" class="action-chip chip-taken batch-chip" title="Принять все ближайшие приемы">
                        <i class="bi bi-check2-all"></i> Принять все
                    </button>
                </form>
                <form th:action="@{/intakes/user/{profileId}/batch-status(profileId=${profileId})}"
                      method="post" class="status-form batch-status-form">
                    <input type="hidden" name="status" value="CANCELLED">
                    <button type="submit" class="action-chip chip-cancelled batch-chip" title="Отменить все ближайшие приемы">
                        <i class="bi bi-x-circle"></i> Отменить все
                    </button>
                </form>
                <form th:action="@{/intakes/user/{profileId}/batch-move(profileId=${profileId})}"
                      method="post">
                    <button type="submit" class="action-chip chip-move batch-chip" title="Перенести все ближайшие приемы">
                        <i class="bi bi-arrow-right-circle"></i> Перенести все
                    </button>
                </form>
            </div>
        </div>

        <div th:each="intake : ${intakes}"
             th:if="${#lists.contains(nearestIntakeIds, intake.id) and intake.intakeStatus != 'PAUSED'}"
             class="intake-card nearest"
             th:classappend="${'status-' + #strings.toLowerCase(intake.intakeStatus)}"
             th:data-url="@{/intakes/{id}(id=${intake.id}, returnDate=${date})}"
             onclick="window.location.href = this.dataset.url">

            <div class="intake-time">
                <div th:text="${#temporals.format(intake.scheduledAt, 'HH:mm')}">10:00</div>
                <div class="time-label">прием</div>
            </div>

            <div class="intake-info">
                <div class="intake-description" th:text="${intake.description}">Описание приема</div>
                <div class="intake-meta">
                    <span th:class="${'intake-status-badge badge-' + #strings.toLowerCase(intake.intakeStatus)}"
                          th:text="${intake.intakeStatus}">SCHEDULED</span>
                </div>
            </div>

            <div class="intake-actions" onclick="event.stopPropagation();">
                <form th:action="@{/intakes/{id}/move(id=${intake.id})}" method="post" class="move-form">
                    <input type="hidden" name="returnDate" th:value="${date}">
                    <button type="submit" class="action-chip chip-move" title="Перенести на 30 мин">
                        <i class="bi bi-clock-history"></i> Перенести
                    </button>
                </form>
                <form th:action="@{/intakes/{id}/intakeStatus(id=${intake.id})}" method="post" class="status-form" data-status="TAKEN">
                    <input type="hidden" name="status" value="TAKEN">
                    <input type="hidden" name="returnDate" th:value="${date}">
                    <button type="submit" class="action-chip chip-taken" title="Принято">
                        <i class="bi bi-check-lg"></i> Принято
                    </button>
                </form>
                <form th:action="@{/intakes/{id}/intakeStatus(id=${intake.id})}" method="post" class="status-form" data-status="CANCELLED">
                    <input type="hidden" name="status" value="CANCELLED">
                    <input type="hidden" name="returnDate" th:value="${date}">
                    <button type="submit" class="action-chip chip-cancelled" title="Отменено">
                        <i class="bi bi-x-lg"></i> Отменено
                    </button>
                </form>
            </div>
        </div>
    </div>

    <hr class="section-divider" th:if="${not #lists.isEmpty(nearestIntakeIds)} and ${hasIntakes}">

    <div th:if="${hasIntakes}" class="section-block">
        <div class="section-header">
            <h3><i class="bi bi-list-ul me-2" style="color: #6366f1;"></i> Все приемы за день</h3>
        </div>

        <div th:each="intake : ${intakes}"
             th:if="${intake.intakeStatus != 'PAUSED'}"
             class="intake-card"
             th:classappend="${'status-' + #strings.toLowerCase(intake.intakeStatus)}"
             th:data-url="@{/intakes/{id}(id=${intake.id}, returnDate=${date})}"
             onclick="window.location.href = this.dataset.url">

            <div class="intake-time">
                <div th:text="${#temporals.format(intake.scheduledAt, 'HH:mm')}">10:00</div>
                <div class="time-label">прием</div>
            </div>

            <div class="intake-info">
                <div class="intake-description" th:text="${intake.description}">Описание приема</div>
                <div class="intake-meta">
                    <span th:class="${'intake-status-badge badge-' + #strings.toLowerCase(intake.intakeStatus)}"
                          th:text="${intake.intakeStatus}">SCHEDULED</span>
                </div>
            </div>

            <div class="intake-actions" onclick="event.stopPropagation();">
                <a th:href="@{/intakes/{id}(id=${intake.id}, returnDate=${date})}"
                   class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-info-circle me-1"></i> Подробнее
                </a>
            </div>
        </div>
    </div>

    <div th:unless="${hasIntakes}" class="empty-intakes">
        <i class="bi bi-cup-hot"></i>
        <p th:text="${info != null ? info : 'На этот день приемы не запланированы'}">Нет приемов</p>
    </div>

    <input type="hidden" id="profileId" th:value="${profileId}">
</main>

<script th:src="@{/bootstrap.bundle.min.js}"></script>
<script th:src="@{/intake-script.js}"></script>
</body>
</html>
